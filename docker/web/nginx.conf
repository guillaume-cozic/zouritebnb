server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Assets hashés (Vite: /assets/name-<hash>.ext, Astro: /blog/_astro/) :
    # une nouvelle version change d'URL, cache infini navigateur + CDN.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location /blog/_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Blog statique Astro (pages en dossiers index.html).
    location /blog {
        try_files $uri $uri/ =404;
    }

    # Les HTML référencent les hashes : toujours revalider pour qu'un
    # déploiement soit visible immédiatement.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA React : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri /index.html;
    }
}
