name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to deploy"
        required: true
        default: "main"
      skip_tests:
        description: "Skip test suite"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PHP: ghcr.io/${{ github.repository }}-php
  IMAGE_NGINX: ghcr.io/${{ github.repository }}-nginx
  IMAGE_WEB: ghcr.io/${{ github.repository }}-web
  IMAGE_ADMIN: ghcr.io/${{ github.repository }}-admin

jobs:
  test:
    name: Tests
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      - name: Seed API .env for CI
        working-directory: API
        run: |
          cp .env.dist .env
          # The MySQL service is reachable on the runner host (127.0.0.1), not on
          # the docker-network "mysql" hostname. root can create the _test database.
          sed -i 's#^DATABASE_URL=.*#DATABASE_URL="mysql://root:root@127.0.0.1:3306/app?serverVersion=8.4"#' .env

      - name: Install API dependencies
        working-directory: API
        run: composer install --no-interaction --prefer-dist --no-progress

      # JWT keys are gitignored; generate them with the passphrase from .env so
      # auth-dependent tests can encode tokens.
      - name: Generate JWT keypair
        working-directory: API
        run: bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction

      - name: Prepare test database
        working-directory: API
        run: |
          bin/console doctrine:database:create --env=test --if-not-exists
          bin/console doctrine:schema:create --env=test

      - name: Run PHPUnit
        working-directory: API
        run: bin/phpunit

      - name: Run phparkitect
        working-directory: API
        run: vendor/bin/phparkitect check

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install front dependencies
        working-directory: front
        run: npm ci

      - name: Run front tests
        working-directory: front
        run: npm test

  # Les apps statiques (front + blog, admin) sont buildées DANS des images
  # nginx auto-suffisantes : aucun fichier n'est copié sur le VPS, le serveur
  # ne fait que pull + run.
  build-web:
    name: Build web & admin images
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      web_image: ${{ steps.tags.outputs.web_image }}
      admin_image: ${{ steps.tags.outputs.admin_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tags
        id: tags
        run: |
          WEB_LC=$(echo "${IMAGE_WEB}" | tr '[:upper:]' '[:lower:]')
          ADMIN_LC=$(echo "${IMAGE_ADMIN}" | tr '[:upper:]' '[:lower:]')
          echo "web_image=${WEB_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "admin_image=${ADMIN_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_repo=${WEB_LC}" >> "$GITHUB_OUTPUT"
          echo "admin_repo=${ADMIN_LC}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # VITE_API_URL / PUBLIC_FRONT_URL sont cuits dans les bundles au build.
      - name: Build & push web image (front + blog)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            PUBLIC_FRONT_URL=https://www.zouritebnb.com
          tags: |
            ${{ steps.tags.outputs.web_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.web_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.web_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.web_repo }}:buildcache,mode=max

      - name: Build & push admin image
        uses: docker/build-push-action@v7
        with:
          context: ./admin
          file: ./admin/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ steps.tags.outputs.admin_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.admin_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.admin_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.admin_repo }}:buildcache,mode=max

  build-api:
    name: Build API images
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      php_image: ${{ steps.tags.outputs.php_image }}
      nginx_image: ${{ steps.tags.outputs.nginx_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tags
        id: tags
        run: |
          PHP_LC=$(echo "${IMAGE_PHP}" | tr '[:upper:]' '[:lower:]')
          NGINX_LC=$(echo "${IMAGE_NGINX}" | tr '[:upper:]' '[:lower:]')
          echo "php_image=${PHP_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${NGINX_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "php_repo=${PHP_LC}" >> "$GITHUB_OUTPUT"
          echo "nginx_repo=${NGINX_LC}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push PHP image
        uses: docker/build-push-action@v7
        with:
          context: ./API
          file: ./API/docker/php/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.tags.outputs.php_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.php_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.php_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.php_repo }}:buildcache,mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v7
        with:
          context: ./API
          file: ./API/docker/nginx/Dockerfile.prod
          push: true
          build-args: |
            PHP_IMAGE=${{ steps.tags.outputs.php_image }}
          tags: |
            ${{ steps.tags.outputs.nginx_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.nginx_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.nginx_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.nginx_repo }}:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-web, build-api]
    # success() implicite regarde toute la chaîne de needs : un job Tests
    # skippé (skip_tests=true) ferait sauter le deploy alors que les builds
    # sont verts. On ne conditionne donc qu'aux résultats des builds.
    if: ${{ always() && needs.build-web.result == 'success' && needs.build-api.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # Le VPS ne contient que ~/zouritebnb avec deux fichiers de config,
      # réécrits à chaque déploiement : le compose et .env.prod.local (secrets
      # runtime — contenu complet du secret GitHub ENV_PROD_LOCAL, modèle :
      # API/.env.prod.local.dist). Tout le reste vit dans les images GHCR.
      - name: Write .env.prod.local from secret
        env:
          ENV_PROD_LOCAL: ${{ secrets.ENV_PROD_LOCAL }}
        run: |
          if [ -z "${ENV_PROD_LOCAL}" ]; then
            echo "::error::Le secret ENV_PROD_LOCAL est vide ou absent. Créez-le avec le contenu de .env.prod.local (modèle : API/.env.prod.local.dist) : gh secret set ENV_PROD_LOCAL < fichier" >&2
            exit 1
          fi
          printf '%s\n' "${ENV_PROD_LOCAL}" | ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT || 22 }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "umask 077 && mkdir -p ~/zouritebnb && cat > ~/zouritebnb/.env.prod.local"

      - name: Sync prod compose file to VPS
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            API/docker-compose.prod.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:zouritebnb/docker-compose.prod.yml"

      - name: Deploy stack on VPS
        env:
          PHP_IMAGE: ${{ needs.build-api.outputs.php_image }}
          NGINX_IMAGE: ${{ needs.build-api.outputs.nginx_image }}
          WEB_IMAGE: ${{ needs.build-web.outputs.web_image }}
          ADMIN_IMAGE: ${{ needs.build-web.outputs.admin_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT || 22 }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "PHP_IMAGE='${PHP_IMAGE}' \
               NGINX_IMAGE='${NGINX_IMAGE}' \
               WEB_IMAGE='${WEB_IMAGE}' \
               ADMIN_IMAGE='${ADMIN_IMAGE}' \
               GHCR_USER='${GHCR_USER}' \
               GHCR_TOKEN='${GHCR_TOKEN}' \
               bash -s" <<'EOF'
          set -euo pipefail

          cd ~/zouritebnb

          echo "==> Login to GHCR"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          export PHP_IMAGE NGINX_IMAGE WEB_IMAGE ADMIN_IMAGE

          echo "==> Pulling images"
          docker compose -f docker-compose.prod.yml pull

          echo "==> Starting containers"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # IMPORTANT : `< /dev/null` sur chaque `docker compose exec -T`. Ce
          # script est le stdin de `bash -s` (heredoc) ; sans redirection, le
          # premier `exec -T` draine tout le reste du heredoc — les migrations
          # ne s'exécutaient alors jamais et bash sortait en 0 sans rien faire.
          echo "==> Waiting for php container to be ready"
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T php php -v >/dev/null 2>&1 </dev/null; then
              break
            fi
            sleep 2
          done

          echo "==> Running migrations"
          docker compose -f docker-compose.prod.yml exec -T php \
              bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration </dev/null

          echo "==> Verifying database is up to date"
          docker compose -f docker-compose.prod.yml exec -T php \
              bin/console doctrine:migrations:up-to-date --no-interaction </dev/null

          echo "==> Cleaning up dangling images"
          docker image prune -f

          docker logout ghcr.io
          EOF

      # Au premier déploiement, Traefik doit encore obtenir ses certificats
      # Let's Encrypt : on laisse jusqu'à ~2 min avant de déclarer l'échec.
      - name: Smoke test
        run: |
          for i in $(seq 1 12); do
            if curl --fail --silent --show-error --max-time 15 \
                "${{ vars.PRODUCTION_URL }}/api/docs" > /dev/null; then
              echo "==> API is responding"
              exit 0
            fi
            sleep 10
          done
          echo "::error::API still not responding after 2 min" >&2
          exit 1
