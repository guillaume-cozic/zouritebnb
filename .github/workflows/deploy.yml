name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to deploy"
        required: true
        default: "main"
      skip_tests:
        description: "Skip test suite"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PHP: ghcr.io/${{ github.repository }}-php
  IMAGE_NGINX: ghcr.io/${{ github.repository }}-nginx

jobs:
  test:
    name: Tests
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      - name: Seed API .env from dist
        working-directory: API
        run: cp .env.dist .env

      - name: Install API dependencies
        working-directory: API
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        working-directory: API
        run: bin/phpunit

      - name: Run phparkitect
        working-directory: API
        run: vendor/bin/phparkitect check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install front dependencies
        working-directory: front
        run: npm ci

      - name: Run front tests
        working-directory: front
        run: npm test -- --watchAll=false

  build-front:
    name: Build front
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: front/build
          retention-days: 7

  build-api:
    name: Build API images
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      php_image: ${{ steps.tags.outputs.php_image }}
      nginx_image: ${{ steps.tags.outputs.nginx_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tags
        id: tags
        run: |
          PHP_LC=$(echo "${IMAGE_PHP}" | tr '[:upper:]' '[:lower:]')
          NGINX_LC=$(echo "${IMAGE_NGINX}" | tr '[:upper:]' '[:lower:]')
          echo "php_image=${PHP_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${NGINX_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "php_repo=${PHP_LC}" >> "$GITHUB_OUTPUT"
          echo "nginx_repo=${NGINX_LC}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push PHP image
        uses: docker/build-push-action@v6
        with:
          context: ./API
          file: ./API/docker/php/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.tags.outputs.php_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.php_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.php_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.php_repo }}:buildcache,mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./API
          file: ./API/docker/nginx/Dockerfile.prod
          push: true
          build-args: |
            PHP_IMAGE=${{ steps.tags.outputs.php_image }}
          tags: |
            ${{ steps.tags.outputs.nginx_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.nginx_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.nginx_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.nginx_repo }}:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-front, build-api]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download front build
        uses: actions/download-artifact@v4
        with:
          name: front-build
          path: front-build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync front build to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            front-build/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONT_DEPLOY_PATH }}/"

      - name: Sync prod compose file to VPS
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            API/docker-compose.prod.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.API_DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Deploy API on VPS
        env:
          PHP_IMAGE: ${{ needs.build-api.outputs.php_image }}
          NGINX_IMAGE: ${{ needs.build-api.outputs.nginx_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT || 22 }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "API_DEPLOY_PATH='${{ secrets.API_DEPLOY_PATH }}' \
               PHP_IMAGE='${PHP_IMAGE}' \
               NGINX_IMAGE='${NGINX_IMAGE}' \
               GHCR_USER='${GHCR_USER}' \
               GHCR_TOKEN='${GHCR_TOKEN}' \
               bash -s" <<'EOF'
          set -euo pipefail

          cd "${API_DEPLOY_PATH}"

          if [ ! -f .env.prod.local ]; then
            echo "ERROR: ${API_DEPLOY_PATH}/.env.prod.local missing. Create it from .env.prod.local.dist." >&2
            exit 1
          fi

          echo "==> Login to GHCR"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          export PHP_IMAGE NGINX_IMAGE

          echo "==> Pulling images"
          docker compose -f docker-compose.prod.yml pull

          echo "==> Starting containers"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "==> Waiting for php container to be ready"
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T php php -v >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "==> Running migrations"
          docker compose -f docker-compose.prod.yml exec -T php \
              bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

          echo "==> Cleaning up dangling images"
          docker image prune -f

          docker logout ghcr.io
          EOF

      - name: Smoke test
        run: |
          curl --fail --silent --show-error --max-time 15 \
            "${{ vars.PRODUCTION_URL }}/api/docs" > /dev/null
          echo "==> API is responding"
