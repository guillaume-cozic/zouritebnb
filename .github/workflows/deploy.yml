name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to deploy"
        required: true
        default: "main"
      skip_tests:
        description: "Skip test suite"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Tests
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      - name: Install API dependencies
        working-directory: API
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        working-directory: API
        run: bin/phpunit

      - name: Run phparkitect
        working-directory: API
        run: vendor/bin/phparkitect check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install front dependencies
        working-directory: front
        run: npm ci

      - name: Run front tests
        working-directory: front
        run: npm test -- --watchAll=false

  build-front:
    name: Build front
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: front/build
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [build-front]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Download front build
        uses: actions/download-artifact@v4
        with:
          name: front-build
          path: front-build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync front build to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            front-build/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONT_DEPLOY_PATH }}/"

      - name: Deploy API on VPS
        env:
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT || 22 }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "DEPLOY_REF='${DEPLOY_REF}' API_DEPLOY_PATH='${{ secrets.API_DEPLOY_PATH }}' bash -s" <<'EOF'
          set -euo pipefail

          cd "${API_DEPLOY_PATH}"

          echo "==> Fetching git ref ${DEPLOY_REF}"
          git fetch --all --prune
          git checkout "${DEPLOY_REF}"
          git reset --hard "origin/${DEPLOY_REF}" 2>/dev/null || git reset --hard "${DEPLOY_REF}"

          echo "==> Building containers"
          docker compose -f API/docker-compose.yml build

          echo "==> Starting containers"
          docker compose -f API/docker-compose.yml up -d

          echo "==> Installing composer dependencies"
          docker compose -f API/docker-compose.yml exec -T php composer install --no-dev --optimize-autoloader --no-interaction

          echo "==> Running migrations"
          docker compose -f API/docker-compose.yml exec -T php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

          echo "==> Clearing cache"
          docker compose -f API/docker-compose.yml exec -T php bin/console cache:clear --env=prod
          docker compose -f API/docker-compose.yml exec -T php bin/console cache:warmup --env=prod
          EOF

      - name: Smoke test
        run: |
          curl --fail --silent --show-error --max-time 15 \
            "${{ vars.PRODUCTION_URL }}/api/docs" > /dev/null
          echo "==> API is responding"