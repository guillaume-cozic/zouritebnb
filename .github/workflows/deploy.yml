name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to deploy"
        required: true
        default: "main"
      skip_tests:
        description: "Skip test suite"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PHP: ghcr.io/${{ github.repository }}-php
  IMAGE_NGINX: ghcr.io/${{ github.repository }}-nginx

jobs:
  test:
    name: Tests
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      - name: Seed API .env for CI
        working-directory: API
        run: |
          cp .env.dist .env
          # The MySQL service is reachable on the runner host (127.0.0.1), not on
          # the docker-network "mysql" hostname. root can create the _test database.
          sed -i 's#^DATABASE_URL=.*#DATABASE_URL="mysql://root:root@127.0.0.1:3306/app?serverVersion=8.4"#' .env

      - name: Install API dependencies
        working-directory: API
        run: composer install --no-interaction --prefer-dist --no-progress

      # JWT keys are gitignored; generate them with the passphrase from .env so
      # auth-dependent tests can encode tokens.
      - name: Generate JWT keypair
        working-directory: API
        run: bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction

      - name: Prepare test database
        working-directory: API
        run: |
          bin/console doctrine:database:create --env=test --if-not-exists
          bin/console doctrine:schema:create --env=test

      - name: Run PHPUnit
        working-directory: API
        run: bin/phpunit

      - name: Run phparkitect
        working-directory: API
        run: vendor/bin/phparkitect check

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install front dependencies
        working-directory: front
        run: npm ci

      - name: Run front tests
        working-directory: front
        run: npm test

  build-front:
    name: Build front
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: front-build
          path: front/dist
          retention-days: 7

  build-admin:
    name: Build admin
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build
        working-directory: admin
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: admin-build
          path: admin/dist
          retention-days: 7

  build-blog:
    name: Build blog
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies
        working-directory: blog
        run: npm ci

      # Astro is configured with base '/blog'; output is served under www/blog.
      - name: Build
        working-directory: blog
        env:
          PUBLIC_FRONT_URL: https://www.zouritebnb.com
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: blog-build
          path: blog/dist
          retention-days: 7

  build-api:
    name: Build API images
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      php_image: ${{ steps.tags.outputs.php_image }}
      nginx_image: ${{ steps.tags.outputs.nginx_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tags
        id: tags
        run: |
          PHP_LC=$(echo "${IMAGE_PHP}" | tr '[:upper:]' '[:lower:]')
          NGINX_LC=$(echo "${IMAGE_NGINX}" | tr '[:upper:]' '[:lower:]')
          echo "php_image=${PHP_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${NGINX_LC}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "php_repo=${PHP_LC}" >> "$GITHUB_OUTPUT"
          echo "nginx_repo=${NGINX_LC}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push PHP image
        uses: docker/build-push-action@v7
        with:
          context: ./API
          file: ./API/docker/php/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.tags.outputs.php_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.php_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.php_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.php_repo }}:buildcache,mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v7
        with:
          context: ./API
          file: ./API/docker/nginx/Dockerfile.prod
          push: true
          build-args: |
            PHP_IMAGE=${{ steps.tags.outputs.php_image }}
          tags: |
            ${{ steps.tags.outputs.nginx_repo }}:${{ github.sha }}
            ${{ steps.tags.outputs.nginx_repo }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.nginx_repo }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.nginx_repo }}:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-front, build-admin, build-blog, build-api]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Download front build
        uses: actions/download-artifact@v8
        with:
          name: front-build
          path: front-build

      - name: Download admin build
        uses: actions/download-artifact@v8
        with:
          name: admin-build
          path: admin-build

      - name: Download blog build
        uses: actions/download-artifact@v8
        with:
          name: blog-build
          path: blog-build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # --delete prunes stale files, but /blog lives inside the front docroot
      # (served at www/blog) and is synced separately — exclude it here.
      - name: Sync front build to VPS (www.zouritebnb.com)
        run: |
          rsync -az --delete --exclude '/blog' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            front-build/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONT_DEPLOY_PATH }}/"

      - name: Sync admin build to VPS (adm.zouritebnb.com)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            admin-build/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.ADMIN_DEPLOY_PATH }}/"

      - name: Sync blog build to VPS (www.zouritebnb.com/blog)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            blog-build/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONT_DEPLOY_PATH }}/blog/"

      - name: Sync prod compose file to VPS
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT || 22 }}" \
            API/docker-compose.prod.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.API_DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Deploy API on VPS
        env:
          PHP_IMAGE: ${{ needs.build-api.outputs.php_image }}
          NGINX_IMAGE: ${{ needs.build-api.outputs.nginx_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT || 22 }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "API_DEPLOY_PATH='${{ secrets.API_DEPLOY_PATH }}' \
               PHP_IMAGE='${PHP_IMAGE}' \
               NGINX_IMAGE='${NGINX_IMAGE}' \
               GHCR_USER='${GHCR_USER}' \
               GHCR_TOKEN='${GHCR_TOKEN}' \
               bash -s" <<'EOF'
          set -euo pipefail

          cd "${API_DEPLOY_PATH}"

          if [ ! -f .env.prod.local ]; then
            echo "ERROR: ${API_DEPLOY_PATH}/.env.prod.local missing. Create it from .env.prod.local.dist." >&2
            exit 1
          fi

          echo "==> Login to GHCR"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          export PHP_IMAGE NGINX_IMAGE

          echo "==> Pulling images"
          docker compose -f docker-compose.prod.yml pull

          echo "==> Starting containers"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "==> Waiting for php container to be ready"
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T php php -v >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "==> Running migrations"
          docker compose -f docker-compose.prod.yml exec -T php \
              bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

          echo "==> Cleaning up dangling images"
          docker image prune -f

          docker logout ghcr.io
          EOF

      - name: Smoke test
        run: |
          curl --fail --silent --show-error --max-time 15 \
            "${{ vars.PRODUCTION_URL }}/api/docs" > /dev/null
          echo "==> API is responding"
