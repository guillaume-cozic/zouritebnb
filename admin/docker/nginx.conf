server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Ne pas divulguer la version de nginx (header Server + pages d'erreur).
    server_tokens off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Assets hashés Vite : une nouvelle version change d'URL, cache infini.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # index.html référence les hashes : toujours revalider.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA React : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri /index.html;
    }
}
