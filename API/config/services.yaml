# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Accommodation\Domain\Port\AccommodationRepository:
        alias: App\Accommodation\Infrastructure\Doctrine\DoctrineAccommodationRepository

    App\Accommodation\Domain\Port\PhotoRepository:
        alias: App\Accommodation\Infrastructure\Doctrine\DoctrinePhotoRepository

    App\Accommodation\Domain\Port\PhotoStorage:
        alias: App\Accommodation\Infrastructure\Filesystem\LocalPhotoStorage

    App\Accommodation\Domain\Port\GalleryRepository:
        alias: App\Accommodation\Infrastructure\Doctrine\DoctrineGalleryRepository

    App\Accommodation\Domain\Port\ImageTransformer:
        alias: App\Accommodation\Infrastructure\Gd\GdImageTransformer

    App\SolidarityProject\Domain\Port\SolidarityProjectRepository:
        alias: App\SolidarityProject\Infrastructure\Doctrine\DoctrineSolidarityProjectRepository

    App\Reservation\Domain\Port\ReservationRepository:
        alias: App\Reservation\Infrastructure\Doctrine\DoctrineReservationRepository

    App\Team\Domain\Port\TeamRepository:
        alias: App\Team\Infrastructure\Doctrine\DoctrineTeamRepository

    App\Team\Domain\Port\TeamInvitationRepository:
        alias: App\Team\Infrastructure\Doctrine\DoctrineTeamInvitationRepository

    App\User\Domain\Port\UserRepository:
        alias: App\User\Infrastructure\Doctrine\DoctrineUserRepository

    App\User\Domain\Port\PasswordHasher:
        alias: App\User\Infrastructure\PasswordHasher\BcryptPasswordHasher

    App\User\Domain\Port\IdentityDocumentStorage:
        alias: App\User\Infrastructure\Filesystem\LocalIdentityDocumentStorage

    App\User\Infrastructure\Filesystem\LocalIdentityDocumentStorage:
        arguments:
            $uploadDir: '%kernel.project_dir%/var/uploads/identity-documents'

    App\User\Application\Listener\StoreIdentityDocumentsOnIdentityVerified:
        tags: [messenger.message_handler]

    App\Accommodation\Infrastructure\Filesystem\LocalPhotoStorage:
        arguments:
            $uploadDir: '%kernel.project_dir%/var/uploads/photos'

    App\Shared\Infrastructure\Controller\ServePhotoController:
        arguments:
            $photoUploadDir: '%kernel.project_dir%/var/uploads/photos'

    App\SolidarityProject\Domain\Port\SolidarityProjectImageStorage:
        alias: App\SolidarityProject\Infrastructure\Filesystem\LocalSolidarityProjectImageStorage

    App\SolidarityProject\Infrastructure\Filesystem\LocalSolidarityProjectImageStorage:
        arguments:
            $uploadDir: '%kernel.project_dir%/var/uploads/solidarity-projects'

    App\Shared\Infrastructure\Controller\ServeSolidarityProjectImageController:
        arguments:
            $imageUploadDir: '%kernel.project_dir%/var/uploads/solidarity-projects'

    App\Accommodation\Application\Listener\StorePhotoOnPhotoUploaded:
        tags: [messenger.message_handler]

    App\Accommodation\Application\Listener\DeletePhotoFileOnPhotoDeleted:
        tags: [messenger.message_handler]

    App\Shared\Domain\Port\EventBus:
        alias: App\Shared\Infrastructure\Messenger\MessengerEventBus

    App\Shared\Domain\Port\TransactionManager:
        alias: App\Shared\Infrastructure\Doctrine\DoctrineTransactionManager

    App\Shared\Domain\Port\AccommodationPricingProvider:
        alias: App\Accommodation\Infrastructure\Doctrine\DoctrineAccommodationPricingProvider

    App\Shared\Domain\Port\ReservationSummaryProvider:
        alias: App\Reservation\Infrastructure\Doctrine\DoctrineReservationSummaryProvider

    App\Shared\Domain\Port\TeamMembershipChecker:
        alias: App\User\Infrastructure\Doctrine\DoctrineTeamMembershipChecker

    App\Shared\Domain\Port\UserTeamProvider:
        alias: App\User\Infrastructure\Doctrine\DoctrineUserTeamProvider

    App\Shared\Domain\Port\Clock:
        alias: App\Shared\Infrastructure\SystemClock

    App\Conversation\Domain\Port\ConversationRepository:
        alias: App\Conversation\Infrastructure\Doctrine\DoctrineConversationRepository

    App\Conversation\Application\Listener\StartConversationOnReservationRequested:
        tags: [messenger.message_handler]

    App\Conversation\Application\Listener\PostRefusalSystemMessageOnReservationRefused:
        tags: [messenger.message_handler]

    App\Reservation\Infrastructure\Messenger\ScheduleReservationExpiry:
        tags: [messenger.message_handler]

    App\Geography\Domain\Port\RegionRepository:
        alias: App\Geography\Infrastructure\Doctrine\DoctrineRegionRepository

    App\Geography\Domain\Port\LocalityRepository:
        alias: App\Geography\Infrastructure\Doctrine\DoctrineLocalityRepository

    App\Payment\Domain\Port\PaymentRepository:
        alias: App\Payment\Infrastructure\Doctrine\DoctrinePaymentRepository

    App\Payment\Domain\Port\PaymentGateway:
        alias: App\Payment\Infrastructure\Stripe\StripePaymentGateway

    App\Review\Domain\Port\ReviewRepository:
        alias: App\Review\Infrastructure\Doctrine\DoctrineReviewRepository

    App\Review\Domain\Port\CompletedStayChecker:
        alias: App\Review\Infrastructure\Doctrine\DbalCompletedStayChecker

    Stripe\StripeClient:
        arguments: ['%env(STRIPE_SECRET_KEY)%']

    App\Payment\Infrastructure\Stripe\StripeWebhookSignatureVerifier:
        arguments: ['%env(STRIPE_WEBHOOK_SECRET)%']

    App\Payment\Application\Listener\CapturePaymentOnReservationConfirmed:
        tags: [messenger.message_handler]

    App\Payment\Application\Listener\CancelPaymentOnReservationRefused:
        tags: [messenger.message_handler]

    App\Payment\Application\Listener\CancelPaymentOnReservationCancelled:
        tags: [messenger.message_handler]

    App\Payment\Application\Listener\LinkPaymentOnReservationRequested:
        tags: [messenger.message_handler]

    # --- Notification (transactional email outbox) ---

    App\Shared\Domain\Port\UserContactProvider:
        alias: App\User\Infrastructure\Doctrine\DoctrineUserContactProvider

    App\Shared\Domain\Port\AccommodationSummaryProvider:
        alias: App\Accommodation\Infrastructure\Doctrine\DoctrineAccommodationSummaryProvider

    App\Shared\Domain\Port\TeamContactProvider:
        alias: App\User\Infrastructure\Doctrine\DoctrineTeamContactProvider

    App\Shared\Domain\Port\ConversationMessageProvider:
        alias: App\Conversation\Infrastructure\Doctrine\DoctrineConversationMessageProvider

    App\Notification\Domain\Port\EmailOutbox:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineEmailOutbox

    App\Notification\Domain\Port\SmsOutbox:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineSmsOutbox

    App\Notification\Domain\Port\EmailSender:
        alias: App\Notification\Infrastructure\Mailer\SymfonyEmailSender

    App\Notification\Domain\Port\EmailRenderer:
        alias: App\Notification\Infrastructure\Twig\TwigEmailRenderer

    # No SMS provider yet: log-only stub. Swap for a provider-backed adapter later.
    App\Notification\Domain\Port\SmsSender:
        alias: App\Notification\Infrastructure\Sms\LogSmsSender

    App\Notification\Infrastructure\Mailer\SymfonyEmailSender:
        arguments:
            $fromEmail: '%env(MAILER_FROM_EMAIL)%'
            $fromName: '%env(MAILER_FROM_NAME)%'

    App\Notification\Application\Listener\SendWelcomeEmailOnUserRegistered:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendRequestedEmailOnReservationRequested:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendConfirmationEmailOnReservationConfirmed:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendRefusalEmailOnReservationRefused:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendCancellationEmailOnReservationCancelled:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendHostRequestEmailOnReservationRequested:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendHostCancellationEmailOnReservationCancelled:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendCoHostInvitationEmailOnCoHostInvited:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendMessageEmailOnMessagePosted:
        tags: [messenger.message_handler]

    App\Notification\Application\Listener\SendHostSmsOnReservationRequested:
        tags: [messenger.message_handler]

when@dev:
    services:
        App\Tests\Fixtures\:
            resource: '../tests/Fixtures/'
            tags: ['doctrine.fixture.orm']
            bind:
                $uploadDir: '%kernel.project_dir%/var/uploads/photos'

when@test:
    services:
        App\Tests\Fixtures\:
            resource: '../tests/Fixtures/'
            bind:
                $uploadDir: '%kernel.project_dir%/var/uploads/photos'
            tags: ['doctrine.fixture.orm']
