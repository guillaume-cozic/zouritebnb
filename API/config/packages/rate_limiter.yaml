framework:
    rate_limiter:
        # Brute-force / credential-stuffing protection on login (per client IP).
        login:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        # Registration spam protection (per client IP).
        register:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        # Social login token verification (per client IP).
        social_login:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        # Password reset requests + reset attempts (per client IP): blocks mail-bombing
        # and brute-forcing of reset tokens.
        password_reset:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        # Email verification requests + verify attempts (per client IP).
        verify_email:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'

# In tests many requests share the same client IP within one run; raise the
# limits high enough that throttling never interferes with functional tests.
when@test:
    framework:
        rate_limiter:
            login:
                limit: 100000
            register:
                limit: 100000
            social_login:
                limit: 100000
            password_reset:
                limit: 100000
            verify_email:
                limit: 100000
