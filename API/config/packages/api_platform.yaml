api_platform:
    title: Hello API Platform
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    exception_to_status:
        App\Accommodation\Domain\Exception\AccommodationNotFoundException: 404
        App\Accommodation\Domain\Exception\PhotoNotFoundException: 404
        App\Reservation\Domain\Exception\ReservationNotFoundException: 404
        App\Review\Domain\Exception\ReviewNotFoundException: 404
        App\User\Domain\Exception\UserNotFoundException: 404
        App\User\Domain\Exception\IdentityVerificationException: 409
        DomainException: 422

# La doc OpenAPI (/api/docs, Swagger UI) et l'entrypoint (/api) restent
# réservés au dev et à la CI (api-discovery, contract tests, génération des
# types front) : rien de tout ça ne doit être exposé publiquement.
when@prod:
    api_platform:
        enable_docs: false
        enable_swagger_ui: false
        enable_re_doc: false
        enable_entrypoint: false
