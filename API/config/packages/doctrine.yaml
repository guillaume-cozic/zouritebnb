doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '8.4'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\MySQLPlatform: identity
        auto_mapping: true
        mappings:
            Accommodation:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Accommodation/Infrastructure/Doctrine'
                prefix: 'App\Accommodation\Infrastructure\Doctrine'
                alias: Accommodation
            SolidarityProject:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/SolidarityProject/Infrastructure/Doctrine'
                prefix: 'App\SolidarityProject\Infrastructure\Doctrine'
                alias: SolidarityProject
            Reservation:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Reservation/Infrastructure/Doctrine'
                prefix: 'App\Reservation\Infrastructure\Doctrine'
                alias: Reservation
            Team:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Team/Infrastructure/Doctrine'
                prefix: 'App\Team\Infrastructure\Doctrine'
                alias: Team
            User:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/User/Infrastructure/Doctrine'
                prefix: 'App\User\Infrastructure\Doctrine'
                alias: User
            Conversation:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Conversation/Infrastructure/Doctrine'
                prefix: 'App\Conversation\Infrastructure\Doctrine'
                alias: Conversation
            Geography:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Geography/Infrastructure/Doctrine'
                prefix: 'App\Geography\Infrastructure\Doctrine'
                alias: Geography
            Payment:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Payment/Infrastructure/Doctrine'
                prefix: 'App\Payment\Infrastructure\Doctrine'
                alias: Payment
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
