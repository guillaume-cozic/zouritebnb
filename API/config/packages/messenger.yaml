framework:
    messenger:
        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            sync: 'sync://'

        routing:
            App\Shared\Domain\Event\DomainEvent: async

when@dev:
    framework:
        messenger:
            transports:
                async: 'sync://'

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
