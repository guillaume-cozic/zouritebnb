security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\User\Infrastructure\Doctrine\UserEntity
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Note: Only the *first* matching rule is applied.
    # Default-deny on the API: everything under /api requires authentication
    # unless explicitly whitelisted as PUBLIC_ACCESS above.
    access_control:
        # OpenAPI documentation is public
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }

        # CORS preflight requests must never require authentication
        - { path: ^/api, methods: [OPTIONS], roles: PUBLIC_ACCESS }

        # Public auth routes
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register$, roles: PUBLIC_ACCESS }

        # Stripe webhook is authenticated by HMAC signature verification (Stripe-Signature
        # header), not by a JWT. It must stay public so Stripe's servers can reach it.
        - { path: ^/api/stripe/webhook$, methods: [POST], roles: PUBLIC_ACCESS }

        # Public read access (browsing the marketplace without an account)
        - { path: ^/api/accommodations, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/solidarity_projects, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/regions, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/localities, methods: [GET], roles: PUBLIC_ACCESS }

        # Admin back-office endpoints are restricted to platform administrators
        - { path: ^/api/admin, roles: ROLE_ADMIN }

        # Everything else under /api requires a valid JWT
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
