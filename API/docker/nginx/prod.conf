server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    client_max_body_size 16M;

    # Ne pas divulguer la version de nginx (header Server + pages d'erreur).
    server_tokens off;

    # Security headers (TLS is terminated upstream; HSTS instructs browsers to
    # stick to HTTPS). `always` makes them apply to error responses too.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # The API serves no first-party HTML beyond Swagger docs; deny framing via CSP.
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Uploaded files live in the php container's var/ volume, not in this
    # container's docroot: route them to Symfony (ServePhotoController & co).
    # `^~` takes precedence over the static-extension regex below, which would
    # otherwise try_files them on the local disk and 404.
    location ^~ /uploads/ {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 60s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        # add_header here resets inherited headers; re-assert nosniff so
        # user-uploaded images are never MIME-sniffed by the browser.
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
