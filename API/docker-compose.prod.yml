services:
  php:
    image: ${PHP_IMAGE:?PHP_IMAGE is required (e.g. ghcr.io/owner/bnb-php:sha)}
    container_name: api-php
    restart: unless-stopped
    env_file:
      - .env.prod.local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - php_var:/var/www/html/var

  nginx:
    image: ${NGINX_IMAGE:?NGINX_IMAGE is required (e.g. ghcr.io/owner/bnb-nginx:sha)}
    container_name: api-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - php

  mysql:
    image: mysql:8.4
    container_name: api-mysql
    restart: unless-stopped
    env_file:
      - .env.prod.local
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  php_var:
