services:
  # Reverse proxy : seul service exposé (80/443). Route par domaine vers les
  # conteneurs via les labels ci-dessous et gère les certificats Let's Encrypt
  # (émission + renouvellement automatiques, stockés dans le volume traefik_acme).
  traefik:
    image: traefik:v3.5
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-guillaume.cozic@gmail.com}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme

  php:
    image: ${PHP_IMAGE:?PHP_IMAGE is required (e.g. ghcr.io/owner/bnb-php:sha)}
    container_name: api-php
    restart: unless-stopped
    env_file:
      - .env.prod.local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - php_var:/var/www/html/var

  nginx:
    image: ${NGINX_IMAGE:?NGINX_IMAGE is required (e.g. ghcr.io/owner/bnb-nginx:sha)}
    container_name: api-nginx
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.zouritebnb.com`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=80
    depends_on:
      - php

  # Front voyageurs + blog (www.zouritebnb.com) — code buildé dans l'image.
  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required (e.g. ghcr.io/owner/bnb-web:sha)}
    container_name: bnb-web
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`www.zouritebnb.com`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.services.web.loadbalancer.server.port=80

  # Back-office admin (adm.zouritebnb.com) — code buildé dans l'image.
  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required (e.g. ghcr.io/owner/bnb-admin:sha)}
    container_name: bnb-admin
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`adm.zouritebnb.com`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls.certresolver=le
      - traefik.http.services.admin.loadbalancer.server.port=80

  mysql:
    image: mysql:8.4
    container_name: api-mysql
    restart: unless-stopped
    env_file:
      - .env.prod.local
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  php_var:
  traefik_acme:
