services:
  # Reverse proxy : seul service exposé (80/443). Route par domaine vers les
  # conteneurs via les labels ci-dessous et gère les certificats Let's Encrypt
  # (émission + renouvellement automatiques, stockés dans le volume traefik_acme).
  traefik:
    # v3.6 minimum : les versions antérieures figent l'API docker en 1.24
    # (même avec DOCKER_API_VERSION), refusée par les Docker Engine récents —
    # Traefik ne voit alors aucun conteneur et n'émet aucun certificat.
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-guillaume.cozic@gmail.com}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme

  php:
    image: ${PHP_IMAGE:?PHP_IMAGE is required (e.g. ghcr.io/owner/bnb-php:sha)}
    container_name: api-php
    restart: unless-stopped
    env_file:
      - .env.prod.local
    environment:
      # URL publique du front (liens des emails + base des URLs du sitemap).
      # Pas un secret : posée ici plutôt que dans ENV_PROD_LOCAL.
      FRONTEND_URL: https://www.zouritebnb.com
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - php_var:/var/www/html/var

  # Worker Messenger : consomme la file async (événements de domaine — emails,
  # messages système des conversations, statuts de dons…). Sans lui, les
  # messages s'empilent dans messenger_messages sans jamais être traités.
  # --time-limit : le process sort proprement chaque heure et Docker le
  # relance (mémoire fraîche, nouveau code après déploiement).
  worker:
    image: ${PHP_IMAGE:?PHP_IMAGE is required (e.g. ghcr.io/owner/bnb-php:sha)}
    container_name: api-worker
    restart: unless-stopped
    command: ["bin/console", "messenger:consume", "async", "--time-limit=3600", "--memory-limit=128M"]
    env_file:
      - .env.prod.local
    environment:
      FRONTEND_URL: https://www.zouritebnb.com
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Même volume que php : les listeners écrivent dans var/uploads
      # (photos, avatars) et doivent voir les mêmes fichiers.
      - php_var:/var/www/html/var

  nginx:
    image: ${NGINX_IMAGE:?NGINX_IMAGE is required (e.g. ghcr.io/owner/bnb-nginx:sha)}
    container_name: api-nginx
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.zouritebnb.com`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=80
    depends_on:
      - php

  # Front voyageurs + blog (www.zouritebnb.com) — code buildé dans l'image.
  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required (e.g. ghcr.io/owner/bnb-web:sha)}
    container_name: bnb-web
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`www.zouritebnb.com`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.services.web.loadbalancer.server.port=80

  # Back-office admin (adm.zouritebnb.com) — code buildé dans l'image.
  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required (e.g. ghcr.io/owner/bnb-admin:sha)}
    container_name: bnb-admin
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`adm.zouritebnb.com`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls.certresolver=le
      - traefik.http.services.admin.loadbalancer.server.port=80

  mysql:
    image: mysql:8.4
    container_name: api-mysql
    restart: unless-stopped
    env_file:
      - .env.prod.local
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  php_var:
  traefik_acme:
