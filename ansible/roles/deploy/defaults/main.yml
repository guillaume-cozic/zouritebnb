---
# User the GitHub Actions deploy workflow logs in as (SSH_USER secret).
# It owns the deploy directories and runs `docker compose`.
deploy_user: zourite-deploy

# Directories the workflow rsyncs into (FRONT/ADMIN/API_DEPLOY_PATH secrets).
# Must match the *_DEPLOY_PATH GitHub secrets exactly.
deploy_paths:
  - /home/{{ deploy_user }}/zouritebnb/front
  - /home/{{ deploy_user }}/zouritebnb/admin
  - /home/{{ deploy_user }}/zouritebnb/api
