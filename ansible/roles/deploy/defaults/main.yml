---
# User the GitHub Actions deploy workflow logs in as (SSH_USER secret).
# It owns the deploy directory and runs `docker compose`.
deploy_user: zourite-deploy

# Single directory the workflow writes into (docker-compose.prod.yml +
# .env.prod.local). Everything else lives in the GHCR images.
deploy_paths:
  - /home/{{ deploy_user }}/zouritebnb
